<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title></title>
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap-theme.min.css">
        <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/js/bootstrap.min.js"></script>
	</head>
	<body>
        <div class="container">
            <h1 style="text-align:center;">Успеваемость студентов</h1>
            <div class="row" style="margin-bottom: 20px;">
                <div class="col-md-12">
                    <a href="{% url 'student_add' %}" class="btn btn-primary">
                        <span class="glyphicon glyphicon-plus"></span> Добавить студента
                    </a>
                    <a href="{% url 'subject_list' %}" class="btn btn-info">
                        <span class="glyphicon glyphocin-book"></span>Управление предметами
                    </a>
                </div>
            </div>
            <table class="table table-striped">
                <thead>
                <tr>
                  <th>#</th>
                  <th>ФИО</th>
                    {% for subject in subjects %}
                      <th>{{subject}}</th>
                    {% endfor %}
                    <th>Действия</th>
                </tr>
                </thead>
                <tbody>
                    {% for statistics in student_statistics %}
                        <tr>
                            <th scope="row">{{statistics.student.id}}</th>
                            <td>{{statistics.student.fio}}</td>
                             {% for score in statistics.scores %}
                                <td>{{score}}</td>
                              {% endfor %}
                            <td class="text-nowrap">
                                <a href="{% url 'student_edit' statistics.student.id %}" class="btn btn-xs btn-primary">
                                    <span class="glyphicon glyphicon-pencil"></span>
                                </a>
                                <a href="{% url 'student_delete' statistics.student.id %}" class="btn btn-xs-danger"
                                onclick="return confirm('Точно удалить {{ statistics.student.fio}}?);">
                                    <span class="glyphicon glyphicon-trash"></span>

                                </a>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
	</body>
</html>
