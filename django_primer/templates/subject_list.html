<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Управление предметами</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.4/css/bootstrap-theme.min.css">
</head>
<body>
    <div class="container">
        <div class="row" style="margin-top: 20px; margin-bottom: 20px;">
            <div class="col-md-12">
                <a href="{% url 'index' %}" class="btn btn-default">
                    <span class="glyphicon glyphicon-arrow-left"></span> Назад к успеваемости
                </a>
                <a href="{% url 'subject_add' %}" class="btn btn-primary pull-right">
                    <span class="glyphicon glyphicon-plus"></span> Добавить предмет
                </a>
            </div>
        </div>

        <h1 style="text-align:center;">Управление предметами</h1>

        <table class="table table-striped table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Название предмета</th>
                    <th>Действия</th>
                </tr>
            </thead>
            <tbody>
                {% for subject in subjects %}
                    <tr>
                        <td>{{ subject.id }}</td>
                        <td>{{ subject.name }}</td>
                        <td>
                            <a href="{% url 'subject_edit' subject.id %}" class="btn btn-xs btn-primary">
                                <span class="glyphicon glyphicon-pencil"></span> Редактировать
                            </a>
                            <a href="{% url 'subject_delete' subject.id %}" class="btn btn-xs btn-danger"
                               onclick="return confirm('Удалить предмет «{{ subject.name }}»? Все оценки по этому предмету также будут удалены!');">
                                <span class="glyphicon glyphicon-trash"></span> Удалить
                            </a>
                        </td>
                    </tr>
                {% empty %}
                    <tr>
                        <td colspan="3" style="text-align:center;">Нет предметов</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
